#cloud-config
users:
  - name: pc_admin
    groups: users, admin, wheel
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
packages:
  - ubuntu-desktop
  - winpr3-utils
  - winpr-utils
  - gnome-remote-desktop
package_update: true
package_upgrade: true
runcmd: # cmd's will be run as root

  # Gnome-Remote-Desktop
  - sudo -u gnome-remote-desktop sh -c 'winpr-makecert -silent -rdp -path ~/.local/share/gnome-remote-desktop tls'
  - grdctl --system rdp set-tls-cert /var/lib/gnome-remote-desktop/.local/share/gnome-remote-desktop/tls.crt
  - grdctl --system rdp set-tls-cert /var/lib/gnome-remote-desktop/.local/share/gnome-remote-desktop/tls.crt
  - grdctl --system rdp set-tls-key /var/lib/gnome-remote-desktop/.local/share/gnome-remote-desktop/tls.key
  - grdctl --system rdp enable
  - systemctl enable --now gdm.service
  - systemctl enable --now gnome-remote-desktop.service
